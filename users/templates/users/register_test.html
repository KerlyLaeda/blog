{% extends "posts/layout.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <form method="post">
        {% csrf_token %}
        <fieldset class="form-group">
            <legend class="border-bottom">join</legend>
            {{ form|crispy }}
        </fieldset>
        <button type="submit" class="btn btn-outline-info">sign up</button>
    </form>
    <div class="border-top pt-3">
        <small class="text-muted">
            already have an acc <a href="{% url 'login' %}" class="ml-2">sign in</a>
        </small>
    </div>
{% endblock content %}
